                <p>JUnit 6.0.0-RC3 = Platform 6.0.0-RC3 + Jupiter 6.0.0-RC3 + Vintage 6.0.0-RC3</p>
                <p>See <a href="https://docs.junit.org/6.0.0-RC3/release-notes/">Release Notes</a>.</p>
