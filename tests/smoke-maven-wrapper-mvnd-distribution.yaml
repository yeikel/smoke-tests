                <li><a href="https://github.com/junit-team/junit-framework/commit/5c8fb0f2151fc277c3a0de7c3237d05c919439bb"><code>5c8fb0f</code></a> Reliably support JRE.OTHER with @⁠EnabledOnJre and @⁠DisabledOnJre</li>
