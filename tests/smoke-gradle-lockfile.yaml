      expect:
        data:
            dependencies:
                - name: com.google.code.gson:gson
                  requirements:
                    - file: app/build.gradle.kts
                      groups: []
                      requirement: 2.8.8
                      source: null
                  version: 2.8.8
                - name: com.google.guava:guava
                  requirements:
                    - file: gradle/libs.versions.toml
                      groups: []
                      metadata:
                        property_name: guava
                      requirement: 33.4.5-jre
                      source: null
                  version: 33.4.5-jre
                - name: org.junit.jupiter:junit-jupiter
                  requirements:
                    - file: gradle/libs.versions.toml
                      groups: []
                      metadata:
                        property_name: junit-jupiter
                      requirement: 5.12.1
                      source: null
                  version: 5.12.1
            dependency_files:
                - /gradle-lockfile/settings.gradle.kts
                - /gradle-lockfile/gradle/libs.versions.toml
                - /gradle-lockfile/app/build.gradle.kts
                - /gradle-lockfile/app/gradle.lockfile
    - type: create_pull_request
      expect:
        data:
            base-commit-sha: 11b12b0d55179610f466dba2c3c1fdc45391e058
            dependencies:
                - name: com.google.code.gson:gson
                  previous-requirements:
                    - file: app/build.gradle.kts
                      groups: []
                      requirement: 2.8.8
                      source: null
                  previous-version: 2.8.8
                  requirements:
                    - file: app/build.gradle.kts
                      groups: []
                      requirement: 2.8.9
                      source:
                        type: maven_repo
                        url: https://repo.maven.apache.org/maven2
                  version: 2.8.9
                  directory: /gradle-lockfile
            updated-dependency-files:
                - content: |
                    /*
                     * This file was generated by the Gradle 'init' task.
                     *
                     * This generated file contains a sample Java application project to get you started.
                     * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/8.14/userguide/building_java_projects.html in the Gradle documentation.
                     */

                    plugins {
                        // Apply the application plugin to add support for building a CLI application in Java.
                        application
